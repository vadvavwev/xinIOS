name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - show working directory
        run: |
          pwd
          ls -la

      - name: Debug - check project.yml
        run: |
          echo "=== project.yml exists? ==="
          test -f project.yml && echo "YES" || echo "NO"
          echo "=== project.yml content ==="
          cat project.yml
          echo "=== END ==="

      - name: Debug - show swift files
        run: |
          find . -type f -name "*.swift" | head -10

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive
        run: xcodebuild archive -project EnterpriseApp.xcodeproj -scheme EnterpriseApp -archivePath build.xcarchive

      - name: Export IPA
        run: xcodebuild -exportArchive -archivePath build.xcarchive -exportPath . -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: EnterpriseApp
          path: "*.ipa"
