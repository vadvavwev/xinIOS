name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 进入你的项目根目录
      - name: Enter project directory
        run: cd Desktop/IOS封装/swiftui

      # 安装 xcodegen
      - name: Install XcodeGen
        run: |
          cd Desktop/IOS封装/swiftui
          brew install xcodegen

      # 生成 Xcode 项目
      - name: Generate Xcode Project
        run: |
          cd Desktop/IOS封装/swiftui
          xcodegen generate

      # 编译归档
      - name: Build Archive
        run: |
          cd Desktop/IOS封装/swiftui
          xcodebuild archive \
            -project EnterpriseApp/EnterpriseApp.xcodeproj \
            -scheme EnterpriseApp \
            -archivePath build/EnterpriseApp.xcarchive

      # 导出 IPA
      - name: Export IPA
        run: |
          cd Desktop/IOS封装/swiftui
          xcodebuild -exportArchive \
            -archivePath build/EnterpriseApp.xcarchive \
            -exportPath ipa \
            -exportOptionsPlist ExportOptions.plist

      # 上传 IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: EnterpriseApp
          path: Desktop/IOS封装/swiftui/ipa/
