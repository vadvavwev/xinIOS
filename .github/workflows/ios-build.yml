name: iOS IPA Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PWD: ${{ github.workspace }}

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: app

      - name: Show repo structure
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== ./app ==="
          ls -la ./app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          path: ./app

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        working-directory: ./app
        run: |
          pwd
          ls -la package.json pnpm-lock.yaml 2>/dev/null || echo "package files not found"
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Build web
        working-directory: ./app
        run: pnpm build

      - name: Sync iOS
        working-directory: ./app
        run: pnpm exec cap sync ios

      - name: Verify dist and ios
        run: |
          echo "=== dist ==="
          ls -la ./app/dist/ 2>/dev/null || echo "dist not found"
          echo "=== ios ==="
          ls -la ./app/ios/ 2>/dev/null || echo "ios not found"

      - name: Upload iOS project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: ./app/ios/
          retention-days: 7

  build-ipa:
    needs: build-web
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: app

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-project
          path: ./app/ios/

      - name: List iOS directory
        run: |
          echo "=== ios root ==="
          ls -la ./app/ios/
          echo "=== ios/App ==="
          ls -la ./app/ios/App/

      - name: Build Archive (unsigned)
        run: |
          cd ./app/ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create Payload directory
        run: |
          mkdir -p ./app/ipa/Payload

      - name: Copy .app to Payload
        run: |
          APP_PATH=$(find ./app/ios/App/build -name "*.app" -type d 2>/dev/null | head -1)
          echo "Found app: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" ./app/ipa/Payload/
          else
            echo "ERROR: .app not found"
            ls -laR ./app/ios/App/build/
            exit 1
          fi

      - name: Package IPA
        run: |
          cd ./app/ipa
          zip -ry App.ipa Payload
          ls -lh App.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ./app/ipa/App.ipa
          retention-days: 7