name: iOS IPA Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CI: 'false'

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Find APP_DIR
        id: find-app-dir
        run: |
          APP_DIR=$(find . -name "capacitor.config.ts" -not -path "*/node_modules/*" -exec dirname {} \; 2>/dev/null | head -1)
          if [ -z "$APP_DIR" ]; then
            APP_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; 2>/dev/null | head -1)
          fi
          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Debug pnpm config
        env:
          APP_DIR: ${{ env.APP_DIR }}
        run: |
          echo "=== PNPM CONFIG ==="
          pnpm config list
          echo "=== CI ENV ==="
          echo "CI=$CI"

      - name: Install dependencies (explicit no-frozen-lockfile)
        env:
          APP_DIR: ${{ env.APP_DIR }}
        run: |
          cd "$APP_DIR"
          pwd
          echo "=== DISABLING FROZEN LOCKFILE ==="
          echo "frozen-lockfile=false" >> .npmrc
          echo "prefer-frozen-lockfile=false" >> .npmrc
          cat .npmrc

          echo "=== RUN PNPM INSTALL ==="
          pnpm install --no-frozen-lockfile 2>&1

      - name: Verify node_modules
        env:
          APP_DIR: ${{ env.APP_DIR }}
        run: |
          cd "$APP_DIR"
          echo "===== VERIFY NODE_MODULES ====="
          if [ -d "node_modules" ]; then
            echo "node_modules EXISTS"
          else
            echo "ERROR: node_modules MISSING"
            exit 1
          fi

          echo "===== VERIFY VITE ====="
          if [ -d "node_modules/vite" ]; then
            echo "vite EXISTS"
          else
            echo "ERROR: vite MISSING"
            ls node_modules/ | grep vite || true
            exit 1
          fi

      - name: Build web
        env:
          APP_DIR: ${{ env.APP_DIR }}
        run: |
          cd "$APP_DIR"
          pnpm build

      - name: Sync iOS
        env:
          APP_DIR: ${{ env.APP_DIR }}
        run: |
          cd "$APP_DIR"
          pnpm exec cap sync ios

      - name: Upload iOS project
        env:
          APP_DIR: ${{ env.APP_DIR }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: ${{ env.APP_DIR }}/ios/
          retention-days: 7

  build-ipa:
    needs: build-web
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find APP_DIR
        id: find-app-dir
        run: |
          APP_DIR=$(find . -name "capacitor.config.ts" -not -path "*/node_modules/*" -exec dirname {} \; 2>/dev/null | head -1)
          if [ -z "$APP_DIR" ]; then
            APP_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; 2>/dev/null | head -1)
          fi
          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-project
          path: ${{ env.APP_DIR }}/ios/

      - name: List iOS directory
        run: |
          ls -la ${{ env.APP_DIR }}/ios/
          ls -la ${{ env.APP_DIR }}/ios/App/

      - name: Build Archive (unsigned)
        run: |
          cd ${{ env.APP_DIR }}/ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create Payload and Package IPA
        run: |
          mkdir -p ${{ env.APP_DIR }}/ipa/Payload
          APP_PATH=$(find ${{ env.APP_DIR }}/ios/App/build -name "*.app" -type d 2>/dev/null | head -1)
          echo "Found app: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" ${{ env.APP_DIR }}/ipa/Payload/
            cd ${{ env.APP_DIR }}/ipa
            zip -ry App.ipa Payload
            ls -lh App.ipa
          else
            echo "ERROR: .app not found"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.APP_DIR }}/ipa/App.ipa
          retention-days: 7