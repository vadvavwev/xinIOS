name: iOS IPA Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CI: 'false'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Find APP_DIR
        id: find-app-dir
        run: |
          APP_DIR="$(find . -name 'capacitor.config.ts' -not -path '*/node_modules/*' -exec dirname {} \; 2>/dev/null | head -1)"
          if [ -z "$APP_DIR" ]; then
            APP_DIR="$(find . -name 'package.json' -not -path '*/node_modules/*' -exec dirname {} \; 2>/dev/null | head -1)"
          fi
          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"

      - name: Debug - Verify APP_DIR
        run: |
          echo "Current working directory: $(pwd)"
          echo "APP_DIR from env: $APP_DIR"
          echo "Files in APP_DIR:"
          ls -la "$APP_DIR"

      - name: Install dependencies
        run: |
          cd "$APP_DIR"
          pwd
          printf 'frozen-lockfile=false\nprefer-frozen-lockfile=false\n' >> .npmrc
          cat .npmrc
          pnpm install --no-frozen-lockfile 2>&1

      - name: Verify node_modules
        run: |
          cd "$APP_DIR"
          echo "=== WORKING DIRECTORY ==="
          pwd
          if [ -d "node_modules" ]; then
            echo "node_modules EXISTS"
          else
            echo "ERROR: node_modules MISSING"
            exit 1
          fi
          if [ -d "node_modules/vite" ]; then
            echo "vite EXISTS"
          else
            echo "ERROR: vite MISSING"
            exit 1
          fi

      - name: Build web
        run: |
          cd "$APP_DIR"
          pwd
          ls -la index.html package.json vite.config.ts 2>/dev/null || echo "Build files check"
          pnpm build

      - name: Sync iOS
        run: |
          cd "$APP_DIR"
          pwd
          ls -la dist/ 2>/dev/null || echo "dist check"
          pnpm exec cap sync ios

      - name: Verify iOS directory
        run: |
          cd "$APP_DIR"
          echo "=== WORKING DIRECTORY ==="
          pwd
          ls -la ios/
          ls -la ios/App/

      - name: Build iOS Archive
        run: |
          cd "$APP_DIR/ios/App"
          pwd
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Verify archive and create IPA
        run: |
          cd "$APP_DIR"
          pwd
          echo "=== VERIFY BUILD ==="
          ls -la ios/App/build/
          ls -la ios/App/build/App.xcarchive/ 2>/dev/null || echo "xcarchive check"

          mkdir -p ipa/Payload
          APP_PATH="$(find ios/App/build -name '*.app' -type d 2>/dev/null | head -1)"
          echo "Found .app: $APP_PATH"
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" ipa/Payload/
            cd ipa
            zip -ry App.ipa Payload
            ls -lh App.ipa
          else
            echo "ERROR: .app not found"
            ls -laR ios/App/build/
            exit 1
          fi

      - name: Upload IPA
        run: |
          cd "$APP_DIR"
          pwd
          ls -la ipa/
          ls -la ipa/App.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ./ipa/App.ipa
          retention-days: 7