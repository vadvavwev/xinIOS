name: iOS IPA Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build

      - name: Sync iOS
        run: pnpm exec cap sync ios

      - name: Upload iOS project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: ios/
          retention-days: 7

  build-ipa:
    needs: build-web
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-project
          path: ios/

      - name: List iOS directory
        run: ls -la ios/

      - name: Build Archive (unsigned)
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create Payload directory
        run: |
          mkdir -p ipa/Payload

      - name: Copy .app to Payload
        run: |
          APP_PATH=$(find ios/App/build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" ipa/Payload/
          else
            echo "ERROR: .app not found"
            ls -la ios/App/build/
            exit 1
          fi

      - name: Package IPA
        run: |
          cd ipa
          zip -ry App.ipa Payload
          ls -lh App.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ipa/App.ipa
          retention-days: 7