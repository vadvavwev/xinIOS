name: iOS IPA Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CI: 'false'

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Find APP_DIR
        id: find-app-dir
        run: |
          APP_DIR="$(find . -name 'capacitor.config.ts' -not -path '*/node_modules/*' -exec dirname {} \; 2>/dev/null | head -1)"
          if [ -z "$APP_DIR" ]; then
            APP_DIR="$(find . -name 'package.json' -not -path '*/node_modules/*' -exec dirname {} \; 2>/dev/null | head -1)"
          fi
          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"

      - name: Debug pnpm config
        run: |
          echo "=== PNPM CONFIG ==="
          pnpm config list
          echo "=== CI ENV ==="
          echo "CI=$CI"

      - name: Install dependencies
        run: |
          echo "APP_DIR=$APP_DIR"
          cd "$APP_DIR"
          pwd

          echo "=== DISABLING FROZEN LOCKFILE ==="
          printf 'frozen-lockfile=false\nprefer-frozen-lockfile=false\n' >> .npmrc
          cat .npmrc

          echo "=== RUN PNPM INSTALL ==="
          pnpm install --no-frozen-lockfile 2>&1

      - name: Verify node_modules
        run: |
          cd "$APP_DIR"
          echo "=== VERIFY NODE_MODULES ==="
          if [ -d "node_modules" ]; then
            echo "node_modules EXISTS"
          else
            echo "ERROR: node_modules MISSING"
            exit 1
          fi

          echo "=== VERIFY VITE ==="
          if [ -d "node_modules/vite" ]; then
            echo "vite EXISTS"
          else
            echo "ERROR: vite MISSING"
            exit 1
          fi

      - name: Build web
        run: |
          cd "$APP_DIR"
          pnpm build

      - name: Sync iOS
        run: |
          cd "$APP_DIR"
          pnpm exec cap sync ios

      - name: Verify dist and ios
        run: |
          cd "$APP_DIR"
          echo "=== dist ==="
          ls -la dist/
          echo "=== ios ==="
          ls -la ios/

      - name: Upload iOS project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: "$APP_DIR/ios/"
          retention-days: 7

  build-ipa:
    needs: build-web
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find APP_DIR
        id: find-app-dir
        run: |
          APP_DIR="$(find . -name 'capacitor.config.ts' -not -path '*/node_modules/*' -exec dirname {} \; 2>/dev/null | head -1)"
          if [ -z "$APP_DIR" ]; then
            APP_DIR="$(find . -name 'package.json' -not -path '*/node_modules/*' -exec dirname {} \; 2>/dev/null | head -1)"
          fi
          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-project
          path: "$APP_DIR/ios/"

      - name: List iOS directory
        run: |
          echo "=== ios root ==="
          ls -la "$APP_DIR/ios/"
          echo "=== ios/App ==="
          ls -la "$APP_DIR/ios/App/"

      - name: Build Archive (unsigned)
        run: |
          cd "$APP_DIR/ios/App"
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create Payload and Package IPA
        run: |
          mkdir -p "$APP_DIR/ipa/Payload"

          APP_PATH="$(find "$APP_DIR/ios/App/build" -name '*.app' -type d 2>/dev/null | head -1)"
          echo "Found app: $APP_PATH"

          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" "$APP_DIR/ipa/Payload/"
            cd "$APP_DIR/ipa"
            zip -ry App.ipa Payload
            ls -lh App.ipa
          else
            echo "ERROR: .app not found"
            ls -laR "$APP_DIR/ios/App/build/"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: "$APP_DIR/ipa/App.ipa"
          retention-days: 7